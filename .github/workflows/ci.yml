name: CI - Testes Automatizados

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * MON-FRI'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: 📥 Checkout do repositório
      uses: actions/checkout@v4

    - name: 🔧 Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 📦 Instalar dependências
      run: npm ci

    - name: 🧪 Executar testes com Mocha
      id: test
      run: npm test
      continue-on-error: true

    - name: 📊 Gerar relatório de testes
      if: always()
      run: npm test -- --reporter spec > test-report.txt 2>&1
      continue-on-error: true

    - name: 📤 Upload do relatório legível
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-txt-node-${{ matrix.node-version }}
        path: test-report.txt
        retention-days: 30

    - name: ✅ Verificar status dos testes
      if: always()
      run: |
        if [ "${{ steps.test.outcome }}" = "success" ]; then
          echo "✅ Todos os testes passaram!"
        else
          echo "❌ Alguns testes falharam!"
          exit 1
        fi

    - name: 🔔 Notificar sucesso
      if: success()
      run: echo "Pipeline executada com sucesso! ✅"

    - name: 🔔 Notificar falha
      if: failure()
      run: echo "Pipeline falhou! ❌"
