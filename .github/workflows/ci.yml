name: CI - Testes Automatizados

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * MON-FRI'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: 📥 Checkout do repositório
      uses: actions/checkout@v4

    - name: 🔧 Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 📦 Instalar dependências
      run: npm ci

    - name: 🧪 Executar testes com Mocha
      run: npm test -- --reporter json > test-report.json
      continue-on-error: true

    - name: 📊 Gerar relatório de testes legível
      if: always()
      run: npm test -- --reporter spec > test-report.txt
      continue-on-error: true

    - name: 📄 Processar relatório JSON
      if: always()
      continue-on-error: true
      run: |
        if [ -f test-report.json ] && [ -s test-report.json ]; then
          echo "## Relatório de Testes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          jq -r '.tests[] | "- [\(.fullTitle)] (\(.duration)ms)"' test-report.json >> $GITHUB_STEP_SUMMARY || echo "Erro ao processar JSON" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🔍 Debug - Verificar arquivo JSON
      if: always()
      continue-on-error: true
      run: |
        echo "Verificando arquivo JSON..."
        if [ -f test-report.json ]; then
          echo "✅ Arquivo existe"
          wc -c test-report.json
          echo "Primeiras linhas:"
          head -5 test-report.json
        else
          echo "❌ Arquivo NÃO existe"
        fi

    - name: 📤 Upload do relatório JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-json-node-${{ matrix.node-version }}
        path: test-report.json
        retention-days: 30

    - name: 📤 Upload do relatório legível
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-txt-node-${{ matrix.node-version }}
        path: test-report.txt
        retention-days: 30

    - name: ✅ Verificar status dos testes
      if: always()
      continue-on-error: true
      run: |
        if [ -f test-report.json ] && [ -s test-report.json ]; then
          FAILURES=$(jq '.stats.failures // 0' test-report.json 2>/dev/null || echo "0")
          PASSES=$(jq '.stats.passes // 0' test-report.json 2>/dev/null || echo "0")
          echo "Testes: Sucessos=$PASSES, Falhas=$FAILURES"
          if [ "$FAILURES" = "0" ] && [ "$PASSES" -gt "0" ]; then
            echo "✅ Todos os testes passaram! ($PASSES sucessos)"
          else
            echo "❌ Testes falharam! Falhas: $FAILURES"
            exit 1
          fi
        else
          echo "⚠️ Arquivo de teste não gerado, mas continuando..."
        fi

    - name: 🔔 Notificar sucesso
      if: success()
      run: echo "Pipeline executada com sucesso! ✅"

    - name: 🔔 Notificar falha
      if: failure()
      run: echo "Pipeline falhou! ❌"
